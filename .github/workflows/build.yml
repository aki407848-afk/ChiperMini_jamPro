name: Chiper Deauther Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Build firmware
      run: pio run -e esp32-s3-devkitc-1

    - name: Prepare binaries
      run: |
        mkdir -p artifacts
        cp .pio/build/esp32-s3-devkitc-1/bootloader.bin artifacts/
        cp .pio/build/esp32-s3-devkitc-1/partitions.bin artifacts/
        cp .pio/build/esp32-s3-devkitc-1/firmware.bin artifacts/
        ls -la artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ChiperDeauther_binaries
        path: artifacts/
        retention-days: 30
        if-no-files-found: error
